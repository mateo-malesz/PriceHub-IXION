{% extends 'base.html' %}

{% block title %}Cenniki i Marże - {{ project.name }}{% endblock %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-alpine.css" />

<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm border">
        <div>
            <h2 class="fw-bold mb-1 text-dark">{{ project.name }}</h2>
            <p class="text-muted small mb-0">Centrala zarządzania marżą i cennikami dynamicznymi</p>
        </div>
        <div class="d-flex gap-2">
            <a href="{{ url_for('sync_sellassist') }}" class="btn btn-outline-dark fw-bold">
                <i class="bi bi-arrow-repeat me-2"></i>Katalog
            </a>
            <a href="{{ url_for('sync_bundles', project_id=project.id) }}" class="btn btn-outline-dark fw-bold">
                <i class="bi bi-boxes me-2"></i>Zestawy
            </a>
            <a href="{{ url_for('sync_sote_options', project_id=project.id) }}"
                class="btn btn-outline-info fw-bold text-dark">
                <i class="bi bi-diagram-3 me-2"></i>Mapuj SOTE
            </a>
            <a href="#" class="btn btn-primary fw-bold px-4">
                <i class="bi bi-file-earmark-excel me-2"></i>Importuj Koszty
            </a>
        </div>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div id="pricingGrid" class="ag-theme-alpine" style="height: 70vh; width: 100%;"></div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Definicja kolumn zgodnie z Twoim zapotrzebowaniem z Excela
        const columnDefs = [
            // --- GRUPA: PODSTAWOWE ---
            {
                headerName: "Dane podstawowe",
                children: [
                    { field: "status", headerName: "Status", width: 110, filter: true, checkboxSelection: true },
                    { field: "sku", headerName: "SKU", width: 130, filter: true, sortable: true, pinned: 'left' },
                    {
                        field: "title",
                        headerName: "Nazwa produktu",
                        width: 300,
                        filter: true,
                        sortable: true,
                        cellRenderer: function (params) {
                            let val = params.value || ""; // Zabezpieczenie przed tekstem 'null'
                            if (params.data && params.data.is_variant) {
                                return `<span style="color: #6c757d;"><i class="bi bi-arrow-return-right"></i></span> ${val}`;
                            }
                            return `<strong>${val}</strong>`;
                        }
                    },
                    { field: "producer", headerName: "Producent", width: 130, filter: true },
                    { field: "supplier_name", headerName: "Nazwa dostawcy", width: 140, filter: true },
                    { field: "supplier_sku", headerName: "ID u dostawcy", width: 130, filter: true },
                    { field: "stock_quantity", headerName: "Stan magazynowy", width: 140, sortable: true }
                ]
            },
            // --- GRUPA: KOSZTY WALUTOWE ---
            {
                headerName: "Koszty i Waluty",
                children: [
                    { field: "currency", headerName: "Waluta", width: 100, filter: true },
                    { field: "vat_rate", headerName: "VAT %", width: 90 },
                    { field: "purchase_price_net_currency", headerName: "Cena zakupu (Netto waluta)", width: 180 },
                    { field: "catalog_price_net_currency", headerName: "Cena katalog (Netto waluta)", width: 180 }
                ]
            },
            // --- GRUPA: PRZELICZENIA PLN ---
            {
                headerName: "Przeliczenia PLN (Wyliczane)",
                children: [
                    { field: "purchase_price_current_exchange_pln", headerName: "Cena zakupu (Kurs PLN)", width: 180 },
                    { field: "purchase_price_net_pln", headerName: "Cena zakupu Netto PLN", width: 170 },
                    { field: "purchase_price_gross_pln", headerName: "Cena zakupu Brutto PLN", width: 170 },
                    { field: "catalog_price_current_exchange_pln", headerName: "Cena katalog (Kurs PLN)", width: 180 },
                    { field: "catalog_price_net_pln", headerName: "Cena katalog Netto PLN", width: 170 },
                    { field: "catalog_price_gross_pln", headerName: "Cena katalog Brutto PLN", width: 170 }
                ]
            },
            // --- GRUPA: ERP NEXO ---
            {
                headerName: "System ERP (Nexo)",
                children: [
                    { field: "last_nexo_price_net", headerName: "Ostatni zakup Netto NEXO", width: 180 },
                    { field: "last_nexo_price_gross", headerName: "Ostatni zakup Brutto NEXO", width: 180 }
                ]
            },
            // --- GRUPA: SKLEP SOTE ---
            {
                headerName: "Sklep Docelowy (SOTE)",
                children: [
                    { field: "target_price_gross", headerName: "Cena Brutto SOTE", width: 150, editable: true, cellClass: 'bg-orange-light' },
                    { field: "target_price_strike", headerName: "Cena przekreślona SOTE", width: 180, editable: true },
                    { field: "margin_percent", headerName: "Marża %", width: 110, sortable: true },
                    { field: "margin_pln", headerName: "Marża PLN", width: 120, sortable: true },
                    { field: "min_margin_percent", headerName: "Marża % min", width: 120, editable: true },
                    { field: "last_sync", headerName: "Data synchro SOTE", width: 160 }
                ]
            }
        ];

        // Opcje siatki AG Grid
        const gridOptions = {
            columnDefs: columnDefs,
            rowData: [],
            defaultColDef: {
                resizable: true,
                sortable: true
            },
            pagination: true,
            paginationPageSize: 50,
            paginationPageSizeSelector: [20, 50, 100],

            // --- NOWE: Reguły klas CSS dla całych wierszy ---
            rowClassRules: {
                'row-variant': function (params) {
                    return params.data && params.data.is_variant === true;
                },
                'row-parent': function (params) {
                    return params.data && params.data.is_variant === false;
                }
            },

            onCellValueChanged: function (event) {
                console.log('Zmieniono wartość:', event.data);
            }
        };

        // Inicjalizacja tabeli w wyznaczonym divie
        const gridDiv = document.querySelector('#pricingGrid');
        const gridApi = agGrid.createGrid(gridDiv, gridOptions);
        window.gridApi = gridApi;

        // --- ZASYSSANIE DANYCH Z BACKENDU ---
        // Pokazujemy kręcące się kółko ładowania
        gridApi.showLoadingOverlay();

        // Wykonujemy zapytanie do naszego nowego API
        fetch("{{ url_for('api_project_products', project_id=project.id) }}")
            .then(response => response.json())
            .then(data => {
                if (data.products) {
                    // Wrzucamy dane do tabeli!
                    gridApi.setGridOption('rowData', data.products);
                } else {
                    console.error("Błąd API:", data.error);
                }
            })
            .catch(error => {
                console.error("Błąd sieci:", error);
            })
            .finally(() => {
                // Ukrywamy kółko ładowania
                gridApi.hideOverlay();
            });
    });
</script>

<style>
    /* Stylowanie nagłówków grup w AG Grid, by pasowały do naszego PriceHuba */
    .ag-header-group-cell {
        font-weight: bold !important;
        background-color: #f8f9fa !important;
        border-bottom: 2px solid #dee2e6 !important;
    }

    .ag-header-cell {
        font-weight: 600 !important;
    }

    /* Podświetlenie komórki ceny docelowej, żeby analityk wiedział, że może ją edytować */
    .bg-orange-light {
        background-color: #fff8f2 !important;
        font-weight: bold;
        color: #fd7e14;
    }

    /* Opcjonalnie: lekko szare tło dla całego wiersza wariantu */
    .row-variant {
        background-color: #fcfcfc !important;
        font-size: 0.9em;
        /* mniejsza czcionka dla opcji */
        color: #495057;
    }

    /* Wcięcie kolumn SKU i TITLE dla wariantów, by stworzyć efekt "drzewa" */
    .row-variant .ag-cell[col-id="sku"],
    .row-variant .ag-cell[col-id="title"] {
        padding-left: 35px !important;
        border-left: 3px solid #dee2e6;
        /* pionowa linia wskazująca powiązanie */
    }

    .row-parent {
        border-top: 1px solid #ced4da !important;
        /* mocniejsze oddzielenie rodzin produktów */
    }
</style>
{% endblock %}

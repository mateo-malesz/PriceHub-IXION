{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Zarządzanie Dostawcami</h2>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form
                action="{% if project %}{{ url_for('manage_suppliers', project_id=project.id) }}{% else %}{{ url_for('manage_suppliers') }}{% endif %}"
                method="POST" class="row g-3 align-items-center">
                <div class="col-auto">
                    <label for="supplierName" class="visually-hidden">Nazwa Dostawcy</label>
                    <input type="text" class="form-control" id="supplierName" name="name"
                        placeholder="Wpisz nazwę dostawcy..." required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Dodaj Dostawcę</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-light">
                    <tr>
                        <th scope="col" class="ps-3">ID</th>
                        <th scope="col">Nazwa</th>
                        <th scope="col" class="text-end pe-3">Akcje</th>
                    </tr>
                </thead>
                <tbody>
                    {% for supplier in suppliers %}
                    <tr>
                        <td class="ps-3 align-middle">{{ supplier.id }}</td>
                        <td class="align-middle fw-bold">{{ supplier.name }}</td>
                        <td class="text-end pe-3 align-middle">
                            <form
                                action="{% if project %}{{ url_for('delete_supplier', project_id=project.id, supplier_id=supplier.id) }}{% else %}{{ url_for('delete_supplier', supplier_id=supplier.id) }}{% endif %}"
                                method="POST" class="d-inline"
                                onsubmit="return confirm('Czy na pewno chcesz usunąć tego dostawcę?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Usuń</button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">Brak zdefiniowanych dostawców w bazie.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
